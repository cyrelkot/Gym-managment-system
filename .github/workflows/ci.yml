name: PHP Lint Check

on:
  push:
    branches: [ main ]

jobs:
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint all PHP files
        run: find . -name "*.php" -not -path "./.git/*" | xargs -I {} php -l {}
