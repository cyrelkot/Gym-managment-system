name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Generate OPcache reset script
        env:
          OPCACHE_RESET_TOKEN: ${{ secrets.OPCACHE_RESET_TOKEN }}
        run: |
          TOKEN_HASH=$(echo -n "$OPCACHE_RESET_TOKEN" | sha256sum | awk '{print $1}')
          cat > opcache-reset.php << PHPEOF
          <?php
          if (!isset(\$_GET['token']) || hash('sha256', \$_GET['token']) !== '$TOKEN_HASH') {
              http_response_code(403);
              exit('Forbidden');
          }
          if (function_exists('opcache_reset')) {
              opcache_reset();
              echo 'OPcache cleared.';
          } else {
              echo 'OPcache not enabled.';
          }
          PHPEOF

      - name: Deploy via FTP
        timeout-minutes: 10
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" ftp://153.92.8.144 <<'FTPEOF'
          set ssl:verify-certificate no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set ftp:use-mdtm yes
          mirror --reverse --verbose --parallel=4 \
            --exclude-glob .git/ \
            --exclude-glob .claude/ \
            --exclude-glob .github/ \
            --exclude-glob "*.docx" \
            --exclude-glob gymdb.sql \
            --exclude-glob .ftp-deploy-sync-state.json \
            . /public_html/
          quit
          FTPEOF

      - name: Clear OPcache
        env:
          OPCACHE_RESET_TOKEN: ${{ secrets.OPCACHE_RESET_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          curl -sv "$SITE_URL/opcache-reset.php?token=$OPCACHE_RESET_TOKEN" || true
